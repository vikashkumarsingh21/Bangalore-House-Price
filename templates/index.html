<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangalore House Price Predictor</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #212529;
        }

        .main-card {
            margin-top: 60px;
            border-radius: 15px;
        }

        .card-header {
            background: #0d6efd;
            color: white;
            border-radius: 15px 15px 0 0 !important;
        }

        label {
            font-weight: bold;
            margin-bottom: 5px;
        }

        #prediction {
            color: #198754;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>

</head>

<body>

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-10 col-md-12">

                <div class="card shadow-lg main-card">

                    <div class="card-header text-center">

                        <h2>Bangalore House Price Prediction</h2>

                    </div>

                    <div class="card-body">

                        <form action="/predict" method="POST" onsubmit="send_data(event)">

                            <div class="row">

                                <!-- Location -->

                                <div class="col-md-6 mb-3">

                                    <label>Select Location</label>

                                    <select class="form-select" id="location" name="location" required>

                                        <option value="">Choose Location</option>

                                        {% for location in locations %}

                                        <option value="{{ location }}">

                                            {{ location }}

                                        </option>

                                        {% endfor %}

                                    </select>

                                </div>

                                <!-- BHK -->

                                <div class="col-md-6 mb-3">

                                    <label>BHK</label>

                                    <input type="number" class="form-control" id="bhk" name="bhk" min="1"
                                        placeholder="Enter BHK" required>

                                </div>

                                <!-- Bathroom -->

                                <div class="col-md-6 mb-3">

                                    <label>Bathrooms</label>

                                    <input type="number" class="form-control" id="bath" name="bath" min="1"
                                        placeholder="Enter Bathrooms" required>

                                </div>

                                <!-- Square Feet -->

                                <div class="col-md-6 mb-3">

                                    <label>Total Square Feet</label>

                                    <input type="number" class="form-control" id="total_sqft" name="total_sqft"
                                        min="100" placeholder="Enter Square Feet" required>

                                </div>

                                <!-- Button -->

                                <div class="col-12 mt-3">

                                    <button type="submit" class="btn btn-primary w-100">

                                        Predict Price

                                    </button>

                                </div>

                            </div>

                        </form>

                        <hr>

                        <div class="text-center">

                            <h4>Prediction Result</h4>

                            <h3 id="prediction">

                                {{ prediction_text }}

                            </h3>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script>
        function send_data(event) {

            event.preventDefault();

            const form = document.querySelector("form");
            var fd = new FormData(form);

            var xhr = new XMLHttpRequest();

            xhr.open('POST', '/predict', true);

            document.getElementById("prediction").innerHTML = "Predicting...";

            xhr.onreadystatechange = function () {

                if (xhr.readyState === 4) {

                    if (xhr.status === 200) {

                        document.getElementById("prediction").innerHTML =
                            "Predicted Price: ₹ " + xhr.responseText;

                    } else {

                        document.getElementById("prediction").innerHTML =
                            "Something went wrong.";

                    }

                }

            }

            xhr.send(fd);

        }

    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
