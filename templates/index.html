<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangalore House Price Predictor</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #F7F5F2;
            --card: #FFFFFF;
            --text: #222222;
            --text-secondary: #6B7280;
            --accent: #6B4F3B;
            --accent-secondary: #8C6A52;
            --border: #E5E7EB;
            --input-bg: #FAFAFA;
            --success: #2E7D32;
            --hover: #5A4231;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 48px 16px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent-secondary);
            margin-bottom: 10px;
        }

        .eyebrow::before {
            content: "";
            display: inline-block;
            width: 16px;
            height: 1px;
            background: var(--accent-secondary);
        }

        .page-title {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 2rem;
            color: var(--text);
            letter-spacing: -0.02em;
            margin-bottom: 6px;
        }

        .page-subtitle {
            color: var(--text-secondary);
            font-size: 0.98rem;
            margin-bottom: 0;
        }

        .header-block {
            max-width: 640px;
            margin: 0 auto 28px auto;
        }

        .main-card {
            max-width: 640px;
            margin: 0 auto;
            border-radius: 18px;
            border: 1px solid var(--border);
            background: var(--card);
            box-shadow: 0 2px 4px rgba(20, 16, 12, 0.03), 0 12px 32px rgba(20, 16, 12, 0.06);
        }

        .card-body {
            padding: 40px;
        }

        @media (max-width: 576px) {
            .card-body {
                padding: 28px 22px;
            }

            .page-title {
                font-size: 1.6rem;
            }
        }

        label {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.82rem;
            color: var(--text);
            margin-bottom: 7px;
            display: block;
        }

        .field-hint {
            font-size: 0.78rem;
            color: var(--text-secondary);
            margin-top: 5px;
            margin-bottom: 0;
        }

        .form-select,
        .form-control {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 11px 14px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            color: var(--text);
            height: auto;
            transition: border-color 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease;
        }

        .form-select:hover,
        .form-control:hover {
            border-color: var(--accent-secondary);
        }

        .form-select:focus,
        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(107, 79, 59, 0.12);
            background: var(--card);
            outline: none;
        }

        .form-control::placeholder {
            color: #A3A3A3;
        }

        .form-select {
            cursor: pointer;
        }

        .field-group {
            margin-bottom: 22px;
        }

        hr.divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 34px 0 28px 0;
        }

        .btn-predict {
            background: var(--accent);
            border: none;
            color: #FFFFFF;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.98rem;
            padding: 13px 24px;
            border-radius: 10px;
            letter-spacing: 0.01em;
            transition: background-color 0.18s ease, transform 0.12s ease, box-shadow 0.18s ease;
            box-shadow: 0 1px 2px rgba(20, 16, 12, 0.08);
        }

        .btn-predict:hover {
            background: var(--hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(107, 79, 59, 0.22);
            color: #FFFFFF;
        }

        .btn-predict:active {
            transform: translateY(0);
        }

        .btn-predict:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(107, 79, 59, 0.25);
        }

        .result-panel {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 26px;
            text-align: center;
        }

        .result-label {
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        #prediction {
            font-family: 'Poppins', sans-serif;
            color: var(--success);
            font-weight: 600;
            font-size: 1.9rem;
            margin: 0;
            letter-spacing: -0.01em;
            min-height: 1.2em;
        }

        @media (max-width: 576px) {
            #prediction {
                font-size: 1.5rem;
            }
        }
    </style>

</head>

<body>

    <div class="container">

        <div class="header-block">
            <div class="eyebrow">Bangalore, Karnataka</div>
            <h1 class="page-title">Estimate your property's value</h1>
            <p class="page-subtitle">Enter a few details about the home and get an instant, data-driven price estimate.</p>
        </div>

        <div class="row justify-content-center">

            <div class="col-12">

                <div class="main-card">

                    <div class="card-body">

                        <form action="/predict" method="POST" onsubmit="send_data(event)">

                            <div class="row">

                                <!-- Location -->

                                <div class="col-md-6 field-group">

                                    <label for="location">Location</label>

                                    <select class="form-select" id="location" name="location" required>

                                        <option value="">Choose a neighborhood</option>

                                        {% for location in locations %}

                                        <option value="{{ location }}">

                                            {{ location }}

                                        </option>

                                        {% endfor %}

                                    </select>

                                </div>

                                <!-- BHK -->

                                <div class="col-md-6 field-group">

                                    <label for="bhk">Bedrooms (BHK)</label>

                                    <input type="number" class="form-control" id="bhk" name="bhk" min="1"
                                        placeholder="e.g. 3" required>

                                </div>

                                <!-- Bathroom -->

                                <div class="col-md-6 field-group">

                                    <label for="bath">Bathrooms</label>

                                    <input type="number" class="form-control" id="bath" name="bath" min="1"
                                        placeholder="e.g. 2" required>

                                </div>

                                <!-- Square Feet -->

                                <div class="col-md-6 field-group">

                                    <label for="total_sqft">Total area</label>

                                    <input type="number" class="form-control" id="total_sqft" name="total_sqft"
                                        min="800" placeholder="Square feet" required>

                                </div>

                            </div>

                            <hr class="divider">

                            <button type="submit" class="btn btn-predict w-100">

                                Predict price

                            </button>

                        </form>

                        <div class="mt-4">

                            <div class="result-panel">

                                <div class="result-label">Estimated Property Price</div>

                                <h3 id="prediction">

                                    {{ prediction_text }}

                                </h3>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script>
        function send_data(event) {

            event.preventDefault();

            const form = document.querySelector("form");
            var fd = new FormData(form);

            var xhr = new XMLHttpRequest();

            xhr.open('POST', '/predict', true);

            document.getElementById("prediction").innerHTML = "Predicting...";

            xhr.onreadystatechange = function () {

                if (xhr.readyState === 4) {

                    if (xhr.status === 200) {

                        document.getElementById("prediction").innerHTML =
                            "₹ " + xhr.responseText;

                    } else {

                        document.getElementById("prediction").innerHTML =
                            "Something went wrong.";

                    }

                }

            }

            xhr.send(fd);

        }

    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
